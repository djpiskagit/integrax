<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>TG Leads — Вход</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@600;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0c0c12;--surface:#14141f;--border:#2a2a40;--accent:#7c3aed;--accent2:#06b6d4;--text:#e2e8f0;--muted:#64748b;--red:#ef4444;--green:#10b981;--mono:'Space Mono',monospace;--sans:'Syne',sans-serif}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
    body::before{content:'';position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));z-index:10}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:2.5rem 2.2rem;width:100%;max-width:380px;position:relative;overflow:hidden}
    .card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
    .logo{font-family:var(--mono);font-size:1.25rem;font-weight:700;text-align:center;margin-bottom:.2rem}
    .logo span{color:var(--accent2)}
    .tagline{font-family:var(--mono);font-size:.62rem;color:var(--muted);text-align:center;text-transform:uppercase;letter-spacing:.18em;margin-bottom:2.2rem}
    .field{margin-bottom:1rem}
    .field label{display:block;font-family:var(--mono);font-size:.67rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.35rem}
    .field input{width:100%;background:#1c1c2e;border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:.88rem;padding:.62rem .85rem;outline:none;transition:border-color .2s}
    .field input:focus{border-color:var(--accent2)}
    .btn{width:100%;padding:.65rem;background:var(--accent);border:none;border-radius:4px;color:#fff;font-family:var(--mono);font-size:.82rem;font-weight:700;cursor:pointer;margin-top:.5rem;transition:background .2s;letter-spacing:.04em}
    .btn:hover{background:#6d28d9}
    .error{background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.3);border-radius:4px;padding:.62rem .9rem;font-family:var(--mono);font-size:.75rem;color:var(--red);margin-bottom:1.1rem;text-align:center}
    .lock{font-size:2.2rem;text-align:center;margin-bottom:1.25rem;opacity:.35}

    /* ── Responsive ── */
    @media (max-width: 480px) {
      body { padding: .75rem; align-items: flex-start; padding-top: 3.5rem; }
      .card { padding: 2rem 1.4rem; border-radius: 8px; }
      .logo { font-size: 1.1rem; }
      .tagline { font-size: .58rem; margin-bottom: 1.8rem; }
      .lock { font-size: 1.9rem; margin-bottom: 1rem; }
      .field input { font-size: .84rem; padding: .58rem .75rem; }
      .btn { font-size: .78rem; padding: .6rem; }
    }

    @media (max-width: 360px) {
      .card { padding: 1.6rem 1.1rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="lock">🔐</div>
    <div class="logo">TG<span>_</span>LEADS</div>
    <div class="tagline">Lead Generation Tool</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST" action="/login">
      <div class="field">
        <label>Логин</label>
        <input type="text" name="login" autocomplete="username" autofocus required
               value="{{ login_val or '' }}"/>
      </div>
      <div class="field">
        <label>Пароль</label>
        <input type="password" name="password" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn">→ Войти</button>
    </form>
  </div>
</body>
</html>
