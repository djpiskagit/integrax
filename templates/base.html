<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}TG Leads{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c12; --surface: #14141f; --surface2: #1c1c2e;
      --border: #2a2a40; --accent: #7c3aed; --accent2: #06b6d4;
      --green: #10b981; --yellow: #f59e0b; --red: #ef4444;
      --text: #e2e8f0; --muted: #64748b;
      --mono: 'Space Mono', monospace; --sans: 'Syne', sans-serif; --radius: 4px;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.6; min-height: 100vh; }
    body::before { content: ''; display: block; height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }

    nav { display: flex; align-items: center; gap: 2rem; padding: .85rem 2rem; border-bottom: 1px solid var(--border); background: var(--surface); }
    .nav-logo { font-family: var(--mono); font-size: 1rem; font-weight: 700; color: var(--text); text-decoration: none; letter-spacing: -.5px; }
    .nav-logo span { color: var(--accent2); }
    nav a { color: var(--muted); text-decoration: none; font-size: .82rem; letter-spacing: .05em; transition: color .2s; }
    nav a:hover, nav a.active { color: var(--text); }
    .nav-spacer { flex: 1; }
    .nav-pill { display: inline-flex; align-items: center; gap: .4rem; padding: .28rem .75rem; border: 1px solid var(--border); border-radius: 3px; font-family: var(--mono); font-size: .72rem; transition: all .2s; }
    .nav-pill:hover, .nav-pill.active { border-color: var(--accent2); color: var(--accent2) !important; }
    .nav-user { font-family: var(--mono); font-size: .7rem; color: var(--muted); }
    .nav-logout { font-family: var(--mono); font-size: .7rem; color: var(--muted); border: 1px solid var(--border); border-radius: 3px; padding: .28rem .65rem; text-decoration: none; transition: all .2s; }
    .nav-logout:hover { color: var(--red) !important; border-color: rgba(239,68,68,.4); }

    .container { max-width: 1400px; margin: 0 auto; padding: 0 2rem; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 2px; font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: .04em; }
    .badge-green  { background: rgba(16,185,129,.15); color: var(--green); }
    .badge-yellow { background: rgba(245,158,11,.15);  color: var(--yellow); }
    .badge-red    { background: rgba(239,68,68,.15);   color: var(--red); }
    .badge-purple { background: rgba(124,58,237,.15);  color: #a78bfa; }
    .badge-cyan   { background: rgba(6,182,212,.15);   color: var(--accent2); }

    .btn { display: inline-flex; align-items: center; gap: .5rem; padding: .5rem 1.2rem; border: 1px solid transparent; border-radius: var(--radius); font-family: var(--mono); font-size: .78rem; font-weight: 700; letter-spacing: .05em; cursor: pointer; text-decoration: none; transition: all .2s; white-space: nowrap; }
    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #6d28d9; }
    .btn-secondary { background: transparent; border-color: var(--border); color: var(--text); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-cyan { background: rgba(6,182,212,.1); border-color: var(--accent2); color: var(--accent2); }
    .btn-cyan:hover { background: rgba(6,182,212,.2); }
    .btn-sm { padding: .32rem .8rem; font-size: .72rem; }

    input, select {
      background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-family: var(--mono); font-size: .8rem;
      padding: .48rem .72rem; outline: none; transition: border-color .2s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    select option { background: var(--surface2); }

    #toast { position: fixed; bottom: 2rem; right: 2rem; padding: .7rem 1.4rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--mono); font-size: .78rem; z-index: 999; opacity: 0; transform: translateY(8px); transition: all .3s; pointer-events: none; }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error   { border-color: var(--red);   color: var(--red); }
    #toast.info    { border-color: var(--accent2); color: var(--accent2); }

    {% block extra_style %}{% endblock %}

    /* ── Responsive / Mobile ── */
    @media (max-width: 768px) {
      nav {
        gap: 1rem;
        padding: .75rem 1rem;
        flex-wrap: wrap;
      }
      .nav-logo { font-size: .9rem; }
      nav a:not(.nav-logo):not(.nav-pill):not(.nav-logout) { display: none; }
      .nav-spacer { display: none; }
      .nav-user { display: none; }
      .nav-pill { font-size: .65rem; padding: .24rem .6rem; }
      .nav-logout { font-size: .65rem; padding: .24rem .55rem; }

      .container { padding: 0 1rem; }

      .btn { padding: .45rem 1rem; font-size: .75rem; }
      .btn-sm { padding: .3rem .7rem; font-size: .68rem; }

      input, select { font-size: .82rem; }
    }

    @media (max-width: 480px) {
      nav { padding: .65rem .85rem; gap: .6rem; }
      /* nav-pill (Settings) remains visible on all screen sizes */
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">TG<span>_</span>LEADS</a>
    <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Сканирование</a>
    <a href="/leads" {% if request.path == '/leads' %}class="active"{% endif %}>Лиды</a>
    <div class="nav-spacer"></div>
    {% if session.get('user_name') %}
      <span class="nav-user">{{ session['user_name'] }}</span>
    {% endif %}
    <a href="/settings" class="nav-pill {% if request.path == '/settings' %}active{% endif %}">⚙ Настройки</a>
    <a href="/logout" class="nav-logout">⏻ Выйти</a>
  </nav>

  {% block content %}{% endblock %}
  <div id="toast"></div>
  <script>
    function showToast(msg, type = 'info') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = `show ${type}`;
      setTimeout(() => { t.className = ''; }, 3500);
    }
  </script>
  {% block extra_script %}{% endblock %}
</body>
</html>
