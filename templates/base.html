<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}TG Leads{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    /* ══════════════════════════════════════════
       DESIGN SYSTEM — Brutalist / Terminal vibes
       ══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0c12;
      --surface:   #14141f;
      --surface2:  #1c1c2e;
      --border:    #2a2a40;
      --accent:    #7c3aed;
      --accent2:   #06b6d4;
      --green:     #10b981;
      --yellow:    #f59e0b;
      --red:       #ef4444;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --mono:      'Space Mono', monospace;
      --sans:      'Syne', sans-serif;
      --radius:    4px;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Тонкая полоска-акцент сверху */
    body::before {
      content: '';
      display: block;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    /* ── Навигация ── */
    nav {
      display: flex;
      align-items: center;
      gap: 2rem;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .nav-logo {
      font-family: var(--mono);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .nav-logo span { color: var(--accent2); }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      transition: color .2s;
    }
    nav a:hover, nav a.active { color: var(--text); }
    .nav-spacer { flex: 1; }
    .nav-settings-link {
      display: flex;
      align-items: center;
      gap: .4rem;
      padding: .3rem .75rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      font-family: var(--mono);
      font-size: .75rem;
      transition: border-color .2s, color .2s;
    }
    .nav-settings-link:hover { border-color: var(--accent2); color: var(--accent2) !important; }
    .nav-settings-link.active { border-color: var(--accent2); color: var(--accent2) !important; }

    /* ── Утилиты ── */
    .container { max-width: 1400px; margin: 0 auto; padding: 0 2rem; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 2px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .badge-green  { background: rgba(16,185,129,.15); color: var(--green); }
    .badge-yellow { background: rgba(245,158,11,.15); color: var(--yellow); }
    .badge-red    { background: rgba(239,68,68,.15);  color: var(--red); }
    .badge-purple { background: rgba(124,58,237,.15); color: #a78bfa; }
    .badge-cyan   { background: rgba(6,182,212,.15);  color: var(--accent2); }

    /* ── Кнопки ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .55rem 1.25rem;
      border: 1px solid transparent;
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .05em;
      cursor: pointer;
      text-decoration: none;
      transition: all .2s;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: #6d28d9; }
    .btn-secondary {
      background: transparent;
      border-color: var(--border);
      color: var(--text);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-cyan {
      background: rgba(6,182,212,.1);
      border-color: var(--accent2);
      color: var(--accent2);
    }
    .btn-cyan:hover { background: rgba(6,182,212,.2); }
    .btn-sm { padding: .35rem .85rem; font-size: .75rem; }

    /* ── Inputs ── */
    input, select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: .8rem;
      padding: .5rem .75rem;
      outline: none;
      transition: border-color .2s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    select option { background: var(--surface2); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: .75rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: .8rem;
      z-index: 999;
      opacity: 0;
      transform: translateY(10px);
      transition: all .3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error   { border-color: var(--red);   color: var(--red); }
    #toast.info    { border-color: var(--accent2); color: var(--accent2); }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">TG<span>_</span>LEADS</a>
    <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Сканирование</a>
    <a href="/leads" {% if request.path == '/leads' %}class="active"{% endif %}>Лиды</a>
    <div class="nav-spacer"></div>
    <a href="/settings" class="nav-settings-link {% if request.path == '/settings' %}active{% endif %}">
      ⚙ Настройки
    </a>
  </nav>

  {% block content %}{% endblock %}

  <div id="toast"></div>

  <script>
    function showToast(msg, type = 'info') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `show ${type}`;
      setTimeout(() => { t.className = ''; }, 3500);
    }
  </script>
  {% block extra_script %}{% endblock %}
</body>
</html>
